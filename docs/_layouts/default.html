<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <a href="{{ '/' | relative_url }}" class="site-logo">
          <span class="logo-icon">🦞</span>
          <span class="logo-text">Awesome OpenClaw Papers</span>
        </a>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">Home</a>
          <a href="{{ '/contributing' | relative_url }}" class="nav-link {% if page.url == '/contributing' %}active{% endif %}">Contributing</a>
          <a href="https://github.com/openclaw/awesome-openclaw-papers" class="nav-link nav-external" target="_blank" rel="noopener">
            GitHub
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3.5 3C3.22386 3 3 3.22386 3 3.5C3 3.77614 3.22386 4 3.5 4V3ZM8.5 3.5H9C9 3.22386 8.77614 3 8.5 3V3.5ZM8 8.5C8 8.77614 8.22386 9 8.5 9C8.77614 9 9 8.77614 9 8.5H8ZM2.64645 8.64645C2.45118 8.84171 2.45118 9.15829 2.64645 9.35355C2.84171 9.54882 3.15829 9.54882 3.35355 9.35355L2.64645 8.64645ZM3.5 4H8.5V3H3.5V4ZM8 3.5V8.5H9V3.5H8ZM8.85355 3.14645L2.64645 9.35355L3.35355 8.64645L9.56066 2.43934L8.85355 3.14645Z" fill="currentColor"/></svg>
          </a>
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </nav>
      </div>
    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        Built with care for the <a href="https://github.com/openclaw/openclaw">OpenClaw</a> community.
        Licensed under <a href="https://creativecommons.org/publicdomain/zero/1.0/">CC0 1.0</a>.
      </p>
      <p class="footer-cta">
        Missing a paper? <a href="https://github.com/openclaw/awesome-openclaw-papers/issues/new?template=add-paper.yml">Submit it here</a>
        or <a href="{{ '/contributing' | relative_url }}">learn how to contribute</a>.
      </p>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
