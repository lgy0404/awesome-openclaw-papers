name: Validate Papers Data

on:
  pull_request:
    paths:
      - 'docs/_data/papers.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate YAML structure
        run: python scripts/validate_papers.py
