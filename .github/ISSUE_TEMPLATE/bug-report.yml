name: "\U0001F41B Bug Report"
description: Report a broken link or incorrect information
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Found a broken link or incorrect information? Please let us know!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the issue
      placeholder: "The link to paper X is broken..."
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Location in README
      description: Which section or paper entry has the issue?
      placeholder: "Security & Safety section, paper title..."
    validations:
      required: true
