name: "\U0001F4C4 Add Paper / Resource"
description: Submit a paper or resource — a PR will be created automatically
title: "[Paper] "
labels: ["paper-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing! Fill out the form below and a PR will be generated automatically.
  - type: input
    id: paper_title
    attributes:
      label: Title
      placeholder: "e.g., OpenClaw-RL: Train Any Agent Simply by Talking"
    validations:
      required: true
  - type: dropdown
    id: paper_category
    attributes:
      label: Category
      options:
        - core-framework
        - reinforcement-learning
        - security-safety
        - multi-agent
        - benchmark-evaluation
        - memory-architecture
        - skills-tool-use
        - blog
        - project
    validations:
      required: true
  - type: textarea
    id: paper_description
    attributes:
      label: Brief Description
      description: 1-2 sentence summary of the contribution
      placeholder: "This paper proposes..."
    validations:
      required: true
  - type: input
    id: paper_arxiv
    attributes:
      label: arXiv / Paper Link
      placeholder: "https://arxiv.org/abs/XXXX.XXXXX"
    validations:
      required: false
  - type: input
    id: paper_code
    attributes:
      label: Code Repository
      placeholder: "https://github.com/..."
    validations:
      required: false
  - type: input
    id: paper_url
    attributes:
      label: Other Link (project page, blog post, etc.)
      placeholder: "https://..."
    validations:
      required: false
  - type: input
    id: paper_date
    attributes:
      label: Publication Date
      placeholder: "2026-03"
    validations:
      required: false
  - type: input
    id: paper_tags
    attributes:
      label: Tags (comma-separated)
      placeholder: "security, benchmark, agent"
    validations:
      required: false
